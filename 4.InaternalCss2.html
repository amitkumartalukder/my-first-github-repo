<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        p{
            color: chocolate;
        }

        #uniqx,#uniqy{
            color: aliceblue;
            background-color: darkgray;
            width: 50%;
            font-size: larger;
        }

        .jhumki,.jhum{
            color: antiquewhite;
            background-color: dimgray;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: medium;
            font-weight: 700;
            width: 50%;
        }

        .akash{
            color: rgb(24, 23, 21);
            background-color: rgb(184, 172, 172);
            font-family: 'Times New Roman', Times, serif;
            font-size: x-large;
            font-weight: bolder;
            width: 70%;
        }

        .revenger{
            text-align: center;
            text-decoration: underline;
        }
        
        .marvelx{
            text-transform: uppercase;
            word-spacing: 0cm;
        }

    </style>
</head>
<body>
    <h3>This is Head</h3>
    <p class="jhum">This is first Line</p>
    <p>This is second Line</p>
    <p id="uniqx">This is third Line</p>
    <p class="akash revenger">This is fourth Line</p>
    <p class="jhumki marvelx">This is fifth Line</p>
    <p>This is sixth Line</p>
    <p>This is seven Line</p>
    <p id="uniqy">This is eight Line</p>
</body>
</html>
